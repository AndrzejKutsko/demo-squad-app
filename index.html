<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="calculator-card" aria-label="Calculator">
      <div class="calculator-header">
        <button id="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
      </div>

      <section class="display-panel" aria-label="Calculator display">
        <div id="expression" aria-live="polite"></div>
        <div id="display" aria-live="polite">0</div>
      </section>

      <section class="button-grid" aria-label="Calculator keypad">
        <button type="button" class="btn-action" data-value="AC" data-action="clear" aria-label="All clear">
          AC
          <span class="key-hint">Esc</span>
        </button>
        <button type="button" class="btn-action" data-value="backspace" data-action="backspace" aria-label="Backspace">
          ⌫
          <span class="key-hint">⌫</span>
        </button>
        <button type="button" class="btn-action" data-value="+/-" data-action="negate" aria-label="Toggle sign">
          +/-
          <span class="key-hint">±</span>
        </button>
        <button type="button" class="btn-operator" data-value="/" aria-label="Divide">
          ÷
          <span class="key-hint">/</span>
        </button>

        <button type="button" class="btn-number" data-value="7" aria-label="7">
          7
          <span class="key-hint">7</span>
        </button>
        <button type="button" class="btn-number" data-value="8" aria-label="8">
          8
          <span class="key-hint">8</span>
        </button>
        <button type="button" class="btn-number" data-value="9" aria-label="9">
          9
          <span class="key-hint">9</span>
        </button>
        <button type="button" class="btn-operator" data-value="*" aria-label="Multiply">
          ×
          <span class="key-hint">*</span>
        </button>

        <button type="button" class="btn-number" data-value="4" aria-label="4">
          4
          <span class="key-hint">4</span>
        </button>
        <button type="button" class="btn-number" data-value="5" aria-label="5">
          5
          <span class="key-hint">5</span>
        </button>
        <button type="button" class="btn-number" data-value="6" aria-label="6">
          6
          <span class="key-hint">6</span>
        </button>
        <button type="button" class="btn-operator" data-value="-" aria-label="Subtract">
          −
          <span class="key-hint">-</span>
        </button>

        <button type="button" class="btn-number" data-value="1" aria-label="1">
          1
          <span class="key-hint">1</span>
        </button>
        <button type="button" class="btn-number" data-value="2" aria-label="2">
          2
          <span class="key-hint">2</span>
        </button>
        <button type="button" class="btn-number" data-value="3" aria-label="3">
          3
          <span class="key-hint">3</span>
        </button>
        <button type="button" class="btn-operator" data-value="+" aria-label="Add">
          +
          <span class="key-hint">+</span>
        </button>

        <button type="button" class="btn-number zero" data-value="0" aria-label="0">
          0
          <span class="key-hint">0</span>
        </button>
        <button type="button" class="btn-number" data-value="." data-action="decimal" aria-label="Decimal">
          .
          <span class="key-hint">.</span>
        </button>
        <button type="button" class="btn-equals" data-value="=" data-action="equals" aria-label="Equals">
          =
          <span class="key-hint">Enter</span>
        </button>
      </section>
    </section>

    <section id="history-section" aria-label="Calculation history">
      <div class="history-header">
        <h2>History</h2>
        <button id="clear-history" type="button">Clear</button>
      </div>
      <ul id="history-list" aria-live="polite">
        <li class="empty-state">No calculations yet</li>
      </ul>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
